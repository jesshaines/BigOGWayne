<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — Big OG Wayne</title>

<link rel="stylesheet" href="/assets/css/site.css">

<style>
body { padding: 2rem; }

.checkout-header {
  text-align: center;
  margin-bottom: 2rem;
}

.checkout-header img {
  width: 140px;
}

.checkout-container {
  max-width: 900px;
  margin: 0 auto;
}

.checkout-item {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #333;
  padding: 1rem 0;
}

.checkout-summary {
  margin-top: 2rem;
}

.checkout-btn {
  margin-top: 2rem;
  padding: 1rem;
  width: 100%;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="checkout-header">
  <img src="/assets/images/logo/bow_logo.png" alt="Big OG Wayne">
</div>

<div class="checkout-container">

  <h1>Checkout</h1>

  <div id="checkoutItems"></div>

  <h2>Customer Info</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="text" id="name" placeholder="Full Name"><br><br>
  <input type="text" id="address" placeholder="Shipping Address"><br><br>

  <div class="checkout-summary">
    <p>Subtotal: <span id="checkoutSubtotal">$0.00</span></p>
    <p>Tax: <span id="checkoutTax">$0.00</span></p>
    <h2>Total: <span id="checkoutTotal">$0.00</span></h2>
  </div>

  <button class="checkout-btn" onclick="goToCheckout()">
    Continue to Payment
  </button>

</div>

<script src="/assets/js/globalcart.js"></script>

<script>
function renderCheckout() {
  const cart = getLootBag();
  const container = document.getElementById('checkoutItems');
  const subtotalEl = document.getElementById('checkoutSubtotal');
  const taxEl = document.getElementById('checkoutTax');
  const totalEl = document.getElementById('checkoutTotal');

  if (!cart.length) {
    container.innerHTML = "<p>Your bag is empty</p>";
    return;
  }

  let subtotal = 0;

  container.innerHTML = cart.map(item => {
    subtotal += item.price * item.quantity;

    return `
      <div class="checkout-item">
        <div>
          <strong>${item.name}</strong><br>
          ${item.color || ''} ${item.size || ''}<br>
          Qty: ${item.quantity}
        </div>
        <div>$${item.price}</div>
      </div>
    `;
  }).join("");

  const tax = subtotal * 0.08;
  const total = subtotal + tax;

  subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
  taxEl.textContent = `$${tax.toFixed(2)}`;
  totalEl.textContent = `$${total.toFixed(2)}`;
}

async function goToCheckout() {
  const email = document.getElementById('email').value.trim();
  const name = document.getElementById('name').value.trim();
  const address = document.getElementById('address').value.trim();

  if (!email || !name || !address) {
    alert("Please fill out all fields.");
    return;
  }

  const cart = getLootBag();

  if (!cart.length) {
    alert("Your bag is empty.");
    return;
  }

  try {
    const res = await fetch('/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cart })
    });

    const data = await res.json();

    if (!data.url) {
      alert("Checkout failed.");
      return;
    }

    window.location.href = data.url;

  } catch (err) {
    console.error(err);
    alert("Something went wrong.");
  }
}

document.addEventListener("DOMContentLoaded", renderCheckout);
</script>

</body>
</html>
