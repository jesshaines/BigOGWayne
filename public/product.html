<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link rel="stylesheet" href="/assets/css/site.css">

<style>
.product-page{opacity:0;transition:.2s;}
.product-page.loaded{opacity:1;}
</style>
</head>

<body>

<section class="product-page">
  <div class="product-page-inner">

    <h1 class="product-title"></h1>
    <div class="product-price"></div>

    <div class="product-option-group">
      <div>Color</div>
      <div id="colorOptions"></div>
    </div>

    <div class="product-option-group">
      <div>Size</div>
      <div id="sizeOptions"></div>
    </div>

    <img id="mainProductImage" style="width:300px">

    <!-- IMPORTANT: thumbnail container -->
    <div class="product-thumbs"></div>

  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  try {

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const res = await fetch("/products");
    const json = await res.json();
    const products = json.data || json;

    const product = products.find(p => String(p.id) === String(id));
    if (!product) {
      console.error("Product not found");
      return;
    }

    const titleEl = document.querySelector(".product-title");
    const priceEl = document.querySelector(".product-price");
    const colorContainer = document.getElementById("colorOptions");
    const sizeContainer = document.getElementById("sizeOptions");
    const mainImage = document.getElementById("mainProductImage");
    const thumbContainer = document.querySelector(".product-thumbs");

    titleEl.textContent = product.title;

    const parsed = product.variants
      .filter(v => v.is_enabled)
      .map(v => {
        const parts = v.title.split(" / ");
        return {
          id: v.id,
          price: v.price,
          color: parts[0] || null,
          size: parts[1] || null
        };
      });

    const colors = [...new Set(parsed.map(v => v.color).filter(Boolean))];

    let selectedColor = colors[0] || null;
    let selectedSize = null;

    function getSizes(color) {
      return [...new Set(
        parsed
          .filter(v => !color || v.color === color)
          .map(v => v.size)
          .filter(Boolean)
      )];
    }

    function findVariant() {
      return parsed.find(v =>
        (selectedColor ? v.color === selectedColor : true) &&
        (selectedSize ? v.size === selectedSize : true)
      );
    }

    function updateVariant() {
      const v = findVariant();
      if (!v) return;

      priceEl.textContent = "$" + (v.price / 100).toFixed(2);
    }

    // 🔥 IMAGE FILTERING
    function getImages() {
      if (!product.images) return [];

      if (!colors.length) return product.images;

      const filtered = product.images.filter(img =>
        img.src.toLowerCase().includes(selectedColor?.toLowerCase())
      );

      return filtered.length ? filtered : product.images;
    }

    function renderImages() {
      if (!thumbContainer || !mainImage) return;

      const imgs = getImages();
      if (!imgs.length) return;

      mainImage.src = imgs[0].src;

      thumbContainer.innerHTML = imgs.map((img, i) => `
        <button class="${i===0?'active':''}">
          <img src="${img.src}" width="50">
        </button>
      `).join("");

      thumbContainer.querySelectorAll("button").forEach(btn=>{
        btn.onclick = ()=>{
          thumbContainer.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
          btn.classList.add("active");

          const img = btn.querySelector("img");
          if (img) mainImage.src = img.src;
        };
      });
    }

    function renderSizes() {
      const sizes = getSizes(selectedColor);

      if (!sizes.length) {
        sizeContainer.parentElement.style.display = "none";
        return;
      }

      sizeContainer.parentElement.style.display = "block";

      const SIZE_ORDER = ["XS","S","M","L","XL","2XL","3XL","4XL"];

      sizes.sort((a,b)=>{
        const ai = SIZE_ORDER.indexOf(a);
        const bi = SIZE_ORDER.indexOf(b);
        return (ai===-1?999:ai)-(bi===-1?999:bi);
      });

      if (!selectedSize || !sizes.includes(selectedSize)) {
        selectedSize = sizes[0];
      }

      sizeContainer.innerHTML = sizes.map(size => `
        <button class="${size===selectedSize?'active':''}" data-size="${size}">
          ${size}
        </button>
      `).join("");

      sizeContainer.querySelectorAll("button").forEach(btn=>{
        btn.onclick = ()=>{
          selectedSize = btn.dataset.size;

          sizeContainer.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
          btn.classList.add("active");

          updateVariant();
        };
      });
    }

    function renderColors() {
      if (!colors.length) {
        colorContainer.parentElement.style.display = "none";
        return;
      }

      colorContainer.innerHTML = colors.map(color => `
        <button class="${color===selectedColor?'active':''}" data-color="${color}">
          ${color}
        </button>
      `).join("");

      colorContainer.querySelectorAll("button").forEach(btn=>{
        btn.onclick = ()=>{
          selectedColor = btn.dataset.color;
          selectedSize = null;

          renderSizes();
          renderImages();
          updateVariant();

          colorContainer.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
          btn.classList.add("active");
        };
      });
    }

    renderColors();
    renderSizes();
    renderImages();
    updateVariant();

    document.querySelector(".product-page").classList.add("loaded");

  } catch (err) {
    console.error("CRASH:", err);
  }

});
</script>

</body>
</html>
