<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Big OG Wayne — Product Template</title>

<link rel="stylesheet" href="/assets/css/site.css">

<style>
.product-page{opacity:0;transition:opacity .2s ease;}
.product-page.loaded{opacity:1;}
</style>
</head>

<body>

<section class="product-page">
  <div class="product-page-inner">

    <h1 class="product-title"></h1>
    <div class="product-price"></div>

    <div class="product-meta-row">

      <div class="product-option-group">
        <div class="product-option-label">Color</div>
        <div class="product-option-values" id="colorOptions"></div>
      </div>

      <div class="product-option-group">
        <div class="product-option-label">Size</div>
        <div class="product-option-values" id="sizeOptions"></div>
      </div>

    </div>

    <img id="mainProductImage" style="width:300px">

  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const res = await fetch("/products");
  const data = await res.json();
  const products = data.data || data;

  const product = products.find(p => String(p.id) === String(id));
  if (!product) return;

  const titleEl = document.querySelector(".product-title");
  const priceEl = document.querySelector(".product-price");
  const colorContainer = document.getElementById("colorOptions");
  const sizeContainer = document.getElementById("sizeOptions");
  const img = document.getElementById("mainProductImage");

  titleEl.textContent = product.title;

  const parsed = product.variants
    .filter(v => v.is_enabled)
    .map(v => {
      const parts = v.title.split(" / ");
      return {
        id: v.id,
        price: v.price,
        color: parts[0] || null,
        size: parts[1] || null
      };
    });

  const colors = [...new Set(parsed.map(v => v.color).filter(Boolean))];
  let selectedColor = colors[0];

  function getSizes(color) {
    return [...new Set(parsed.filter(v => v.color === color).map(v => v.size).filter(Boolean))];
  }

  let selectedSize = getSizes(selectedColor)[0];

  function findVariant() {
    return parsed.find(v =>
      v.color === selectedColor &&
      (v.size ? v.size === selectedSize : true)
    );
  }

  function updateVariant() {
    const v = findVariant();
    if (!v) return;

    priceEl.textContent = "$" + (v.price / 100).toFixed(2);
    document.body.dataset.variantId = v.id;
  }

  // 🔥 IMAGE SWITCHING LOGIC
  function updateImage() {
    if (!product.images?.length) return;

    // try to find image that matches color name
    const match = product.images.find(img =>
      img.src.toLowerCase().includes(selectedColor.toLowerCase())
    );

    if (match) {
      img.src = match.src;
    } else {
      // fallback
      img.src = product.images[0].src;
    }
  }

  function renderSizes() {
    const sizes = getSizes(selectedColor);

    if (!sizes.length) {
      sizeContainer.parentElement.style.display = "none";
      return;
    }

    sizeContainer.parentElement.style.display = "block";

    const SIZE_ORDER = ["XS","S","M","L","XL","2XL","3XL","4XL"];

    sizes.sort((a,b)=>{
      const ai = SIZE_ORDER.indexOf(a);
      const bi = SIZE_ORDER.indexOf(b);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });

    if (!sizes.includes(selectedSize)) {
      selectedSize = sizes[0];
    }

    sizeContainer.innerHTML = sizes.map(size => `
      <button class="product-chip ${size===selectedSize?'active':''}" data-size="${size}">
        ${size}
      </button>
    `).join("");

    sizeContainer.querySelectorAll("button").forEach(btn=>{
      btn.onclick = () => {
        selectedSize = btn.dataset.size;

        sizeContainer.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        updateVariant();
      };
    });
  }

  function renderColors() {
    colorContainer.innerHTML = colors.map(color => `
      <button class="product-chip ${color===selectedColor?'active':''}" data-color="${color}">
        ${color}
      </button>
    `).join("");

    colorContainer.querySelectorAll("button").forEach(btn=>{
      btn.onclick = () => {
        selectedColor = btn.dataset.color;
        selectedSize = null;

        renderSizes();
        updateVariant();
        updateImage(); // 🔥 NEW

        colorContainer.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
      };
    });
  }

  // initial image
  if (product.images?.length) {
    img.src = product.images[0].src;
  }

  renderColors();
  renderSizes();
  updateVariant();
  updateImage(); // 🔥 ensure correct on load

  document.querySelector(".product-page").classList.add("loaded");

});
</script>

</body>
</html>
